<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Framework: Document Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex">
    <div id="security-modal" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Secure Engine Locked</h2>
            <p class="text-sm text-gray-500 mb-6">Please enter your authorization key to proceed.</p>
            
            <form id="security-form" class="space-y-4">
                <input type="password" id="secret-key-input" required placeholder="Enter Secret Key..." 
                    class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center tracking-widest font-mono">
                
                <button type="submit" id="unlock-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-md">
                    Unlock Engine
                </button>
            </form>
        </div>
    </div>

    <div class="w-1/4 bg-slate-800 text-white p-6 overflow-y-auto shadow-xl z-10">
        <h2 class="text-xl font-bold mb-6 text-yellow-400 border-b border-slate-700 pb-2"></h2>
        <div id="module-container" class="space-y-6">
            <p class="text-sm text-gray-400 animate-pulse" id="loading-text">Establishing uplink to backend...</p>
        </div>
    </div>

    <div class="w-3/4 p-10 overflow-y-auto bg-slate-50">
        <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <h1 id="form-title" class="text-2xl font-semibold mb-6 text-gray-800">Select a document to begin ...</h1>
            
            <form id="dynamic-form" class="space-y-5 hidden">
                <input type="hidden" id="template_name" name="template_name">
                
                <div id="form-fields" class="grid grid-cols-2 gap-5">
                    </div>

                <div class="pt-4 mt-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Export Format</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="export_format" value="docx" checked class="text-blue-600 focus:ring-blue-500">
                            <span class="text-sm font-medium">Word (.docx)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="export_format" value="pdf" class="text-blue-600 focus:ring-blue-500">
                            <span class="text-sm font-medium">PDF (.pdf)</span>
                        </label>
                    </div>
                </div>
                
                <div class="pt-4 mt-2 border-t border-gray-100">
                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-all shadow-md">
                        Generate
                    </button>
                </div>
            </form>

        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
